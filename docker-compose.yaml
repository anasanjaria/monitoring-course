version: '3.7'
services:
  elasticsearch:
    container_name: elasticsearch
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.24
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
  kibana:
    container_name: kibana
    image: docker.elastic.co/kibana/kibana:7.17.24
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
  metricbeat:
    container_name: metricbeat
    image: docker.elastic.co/beats/metricbeat:7.17.24
    volumes:
      - ./metricbeat.yml:/usr/share/metricbeat/metricbeat.yml:ro
      - /sys/fs/cgroup:/hostfs/sys/fs/cgroup:ro
      - /proc:/hostfs/proc:ro
      - /:/hostfs:ro
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
      - mysql
    command: ["-e", "-E", "output.elasticsearch.hosts=['http://elasticsearch:9200']"]
  mysql:
    container_name: mysql
    image: mysql:8.0.30
    tmpfs: /var/lib/mysql:rw
    environment:
      - MYSQL_ROOT_PASSWORD=secret
    ports:
      - "3306:3306"
  filebeat:
    image: docker.elastic.co/beats/filebeat:7.17.24
    container_name: filebeat
    depends_on:
      - kibana
    volumes:
      - ./filebeat.docker.yml:/usr/share/filebeat/filebeat.yml
      - nginx-logs:/var/log/nginx:Z
  nginx:
    image: nginx:1.23.1
    volumes:
      - nginx-logs:/var/log/nginx:Z
      - ./monitor-nginx-logs/default.conf:/etc/nginx/conf.d/default.conf:Z
      - ./monitor-nginx-logs/nginx.conf:/etc/nginx/nginx.conf:Z
    healthcheck:
      test: [ "CMD", "curl", "-fIs", "http://localhost" ]
      interval: 30s
  curl-request-client:
    volumes:
      - ./monitor-nginx-logs/nginx-access-pipeline.json:/nginx-access-pipeline.json:Z
    image: byrnedo/alpine-curl:3.17
    depends_on:
      - elasticsearch
    command: [
      "-X", "PUT", "http://elasticsearch:9200/_ingest/pipeline/filebeat-7.17.1-nginx-access-pipeline", "-H", "Content-Type: application/json", "-d", "@nginx-access-pipeline.json"
    ]

volumes:
  nginx-logs:
